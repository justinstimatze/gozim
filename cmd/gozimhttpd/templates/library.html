<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gozim Library</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/custom/custom.css" rel="stylesheet">
  </head>

  <body>
    <nav class="navbar navbar-default navbar-static-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <a class="navbar-brand" href="/">Gozim</a>
        </div>
        <div id="navbar" class="navbar-collapse collapse">
          <ul class="nav navbar-nav">
            <li class="active"><a href="/">Library</a></li>
            <li><a href="/about/">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="jumbotron">
        <h1>Gozim Library</h1>
        <p>{{ len .Archives }} archive{{ if ne (len .Archives) 1 }}s{{ end }} available.</p>
      </div>

      <table class="table table-striped">
        <thead>
          <tr>
            <th>Title</th>
            <th>Language</th>
            <th>Articles</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          {{range .Archives}}
          <tr>
            <td><a href="{{ .HomeURL }}">{{ .Title }}</a></td>
            <td>{{ .Language }}</td>
            <td>{{ .EntryCount }}</td>
            <td>{{ .Description }}</td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>

    <div id="footer">
      <div class="container">
        <p class="muted credit">Gozim</p>
      </div>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.min.js"></script>
  </body>
</html>
